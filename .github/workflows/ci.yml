name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build FrameKit
        run: pnpm --filter @mauriciodmo/framekit build
      - name: Lint workspace
        run: pnpm lint
      - name: Run tests
        run: pnpm test
      - name: Type-check workspace
        run: pnpm typecheck
      - name: Build workspace
        run: pnpm build
      - name: Verify package contents
        run: pnpm --filter @mauriciodmo/framekit pack --dry-run
