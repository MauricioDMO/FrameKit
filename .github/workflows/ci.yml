name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build FrameKit
        run: pnpm --filter @mauriciodmo/framekit build
      - name: Add FrameKit CLI to PATH
        run: |
          ln -s cli.js packages/framekit/dist/framekit
          echo "$GITHUB_WORKSPACE/packages/framekit/dist" >> "$GITHUB_PATH"
      - name: Lint workspace
        run: pnpm lint
      - name: Run tests
        run: pnpm test
      - name: Type-check workspace
        run: pnpm typecheck
      - name: Build workspace
        run: pnpm build
      - name: Verify package contents
        run: pnpm --filter @mauriciodmo/framekit pack --dry-run
